<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>布局分析</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #16213e;
      padding: 15px 20px;
      border-bottom: 2px solid #0f3460;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .header h1 {
      font-size: 18px;
      color: #e94560;
    }
    .header-info {
      display: flex;
      gap: 15px;
      align-items: center;
      font-size: 13px;
    }
    .header-info span {
      padding: 5px 10px;
      background: #0f3460;
      border-radius: 4px;
    }
    .toolbar {
      background: #16213e;
      padding: 10px 20px;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid #0f3460;
      flex-wrap: wrap;
    }
    .toolbar button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn-refresh {
      background: #e94560;
      color: white;
    }
    .btn-refresh:hover {
      background: #d63850;
    }
    .btn-export {
      background: #3498db;
      color: white;
    }
    .btn-export:hover {
      background: #2980b9;
    }
    .btn-clear {
      background: #95a5a6;
      color: white;
    }
    .btn-clear:hover {
      background: #7f8c8d;
    }
    .content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    .node-card {
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 15px;
      overflow: hidden;
      border: 1px solid #0f3460;
    }
    .node-header {
      background: #0f3460;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .node-header:hover {
      background: #1a4a7a;
    }
    .node-title {
      font-weight: 600;
      font-size: 14px;
    }
    .node-index {
      color: #e94560;
      margin-right: 10px;
    }
    .node-bounds {
      font-size: 12px;
      color: #aaa;
    }
    .node-details {
      padding: 15px;
      display: none;
    }
    .node-details.show {
      display: block;
    }
    .detail-row {
      display: flex;
      padding: 8px 0;
      border-bottom: 1px solid #0f3460;
    }
    .detail-row:last-child {
      border-bottom: none;
    }
    .detail-label {
      width: 120px;
      color: #888;
      font-size: 13px;
    }
    .detail-value {
      flex: 1;
      font-size: 13px;
      word-break: break-all;
    }
    .detail-value.text {
      color: #00ff00;
    }
    .detail-value.clickable {
      color: #3498db;
      cursor: pointer;
    }
    .detail-value.clickable:hover {
      text-decoration: underline;
    }
    .detail-value.enabled {
      color: #27ae60;
    }
    .detail-value.disabled {
      color: #e74c3c;
    }
    .no-data {
      text-align: center;
      padding: 50px;
      color: #888;
    }
    .no-data .icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    .loading {
      text-align: center;
      padding: 50px;
      color: #e94560;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #27ae60;
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      z-index: 1000;
      animation: fadeIn 0.3s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 布局分析报告</h1>
    <div class="header-info">
      <span id="deviceId">设备: --</span>
      <span id="nodeCount">节点: 0</span>
      <span id="updateTime">更新时间: --</span>
    </div>
  </div>
  
  <div class="toolbar">
    <button class="btn-refresh" onclick="refreshLayout()">🔄 刷新</button>
    <button class="btn-export" onclick="exportLayout()">📥 导出</button>
    <button class="btn-clear" onclick="clearLayout()">🗑️ 清空</button>
  </div>
  
  <div class="content" id="layoutContent">
    <div class="loading">⏳ 正在获取布局数据...</div>
  </div>

  <script>
    let currentDeviceId = '';
    let layoutData = null;
    let ws = null;

    // 从 URL 获取设备 ID
    const urlParams = new URLSearchParams(window.location.search);
    currentDeviceId = urlParams.get('deviceId') || '';

    document.getElementById('deviceId').textContent = '设备: ' + currentDeviceId;

    // 初始化 WebSocket 连接
    function initWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const host = window.location.host;
      const wsUrl = protocol + '//' + host + '/ws';
      
      ws = new WebSocket(wsUrl);
      
      ws.onopen = function() {
        console.log('[布局分析] WebSocket 已连接');
        // 发送登录认证
        ws.send(JSON.stringify({ 
          action: 'login', 
          role: 'web',
          username: localStorage.getItem('currentUser') || 'admin' 
        }));
      };
      
      ws.onmessage = function(event) {
        try {
          const msg = JSON.parse(event.data);
          handleMessage(msg);
        } catch(e) {
          console.error('[布局分析] 解析消息失败:', e);
        }
      };
      
      ws.onclose = function() {
        console.log('[布局分析] WebSocket 连接关闭，5秒后重连...');
        setTimeout(initWebSocket, 5000);
      };
      
      ws.onerror = function(e) {
        console.error('[布局分析] WebSocket 错误:', e);
      };
    }

    var isAuthenticated = false;
    
    function handleMessage(msg) {
      // 处理登录成功消息（兼容 webLoginAck 和 login 两种响应）
      if ((msg.action === 'login' || msg.action === 'webLoginAck') && msg.status === 'success') {
        isAuthenticated = true;
        console.log('[布局分析] 登录成功');
        // 登录成功后自动请求布局数据
        refreshLayout();
        return;
      }
      
      // 处理布局数据
      if (msg.action === 'layoutData' && msg.deviceId === currentDeviceId) {
        layoutData = msg.layout;
        renderLayout(layoutData);
      }
    }

    // 请求刷新布局
    function refreshLayout() {
      console.log('[布局分析] refreshLayout 被调用');
      console.log('[布局分析] ws状态:', ws ? ws.readyState : 'null');
      console.log('[布局分析] isAuthenticated:', isAuthenticated);
      console.log('[布局分析] currentDeviceId:', currentDeviceId);
      
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        console.log('[布局分析] WebSocket 未连接');
        showToast('WebSocket 未连接', 'error');
        return;
      }
      
      if (!isAuthenticated) {
        console.log('[布局分析] 未认证，不发送请求');
        showToast('等待认证...', 'warning');
        return;
      }
      
      document.getElementById('layoutContent').innerHTML = '<div class="loading">⏳ 正在获取布局数据...</div>';
      
      const requestMsg = {
        action: 'sendToDevice',
        targetDevice: currentDeviceId,
        content: JSON.stringify({ action: 'getLayout' })
      };
      console.log('[布局分析] 发送消息:', JSON.stringify(requestMsg));
      ws.send(JSON.stringify(requestMsg));
      
      setTimeout(() => {
        const content = document.getElementById('layoutContent');
        if (content.querySelector('.loading')) {
          content.innerHTML = '<div class="no-data"><div class="icon">⏰</div>请求超时，请检查设备是否在线</div>';
        }
      }, 10000);
    }

    // 渲染布局
    function renderLayout(data) {
      const container = document.getElementById('layoutContent');
      document.getElementById('nodeCount').textContent = '节点: ' + (data?.nodes?.length || 0);
      document.getElementById('updateTime').textContent = '更新时间: ' + new Date().toLocaleTimeString();
      
      if (!data || !data.nodes || data.nodes.length === 0) {
        container.innerHTML = '<div class="no-data"><div class="icon">📭</div>暂无布局数据</div>';
        return;
      }
      
      let html = '';
      data.nodes.forEach((node, index) => {
        const bounds = node.bounds || {};
        const boundsStr = `[${bounds.left || 0}, ${bounds.top || 0}][${bounds.right || 0}, ${bounds.bottom || 0}]`;
        const sizeStr = `${(bounds.right || 0) - (bounds.left || 0)} x ${(bounds.bottom || 0) - (bounds.top || 0)}`;
        
        html += `
          <div class="node-card">
            <div class="node-header" onclick="toggleNode(${index})">
              <span class="node-title">
                <span class="node-index">#${index + 1}</span>
                ${escapeHtml(node.className || node.text || 'Unknown')}
              </span>
              <span class="node-bounds">${boundsStr} | ${sizeStr}</span>
            </div>
            <div class="node-details" id="node-${index}">
              ${renderNodeDetails(node, index)}
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
    }

    function renderNodeDetails(node, index) {
      let html = '';
      
      const fields = [
        { label: '类名', value: node.className },
        { label: '文本', value: node.text, isText: true },
        { label: '包名', value: node.packageName },
        { label: 'Bounds', value: JSON.stringify(node.bounds) },
        { label: 'Clickable', value: node.clickable, isBool: true },
        { label: 'Long-clickable', value: node.longClickable, isBool: true },
        { label: 'Scrollable', value: node.scrollable, isBool: true },
        { label: 'Enabled', value: node.enabled, isBool: true },
        { label: 'Focused', value: node.focused, isBool: true },
        { label: 'Selected', value: node.selected, isBool: true },
        { label: 'Checkable', value: node.checkable, isBool: true },
        { label: 'Checked', value: node.checked, isBool: true },
        { label: 'Index', value: node.index },
        { label: 'ChildCount', value: node.childCount },
        { label: 'DrawingOrder', value: node.drawingOrder },
      ];
      
      fields.forEach(field => {
        if (field.value !== undefined && field.value !== null && field.value !== '') {
          let valueClass = '';
          let displayValue = '';
          
          if (field.isBool) {
            valueClass = field.value ? 'enabled' : 'disabled';
            displayValue = field.value ? '是' : '否';
          } else if (field.isText) {
            valueClass = 'text';
            displayValue = field.value || '(空)';
          } else {
            displayValue = String(field.value);
          }
          
          html += `
            <div class="detail-row">
              <span class="detail-label">${field.label}</span>
              <span class="detail-value ${valueClass}">${escapeHtml(displayValue)}</span>
            </div>
          `;
        }
      });
      
      return html || '<div style="color:#888;padding:10px;">无详细信息</div>';
    }

    function toggleNode(index) {
      const details = document.getElementById('node-' + index);
      details.classList.toggle('show');
    }

    function exportLayout() {
      if (!layoutData) {
        showToast('暂无布局数据可导出', 'error');
        return;
      }
      
      const json = JSON.stringify(layoutData, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'layout_' + currentDeviceId + '_' + new Date().toISOString().slice(0, 19).replace(/:/g, '-') + '.json';
      a.click();
      URL.revokeObjectURL(url);
      
      showToast('布局数据已导出');
    }

    function clearLayout() {
      layoutData = null;
      document.getElementById('layoutContent').innerHTML = '<div class="no-data"><div class="icon">🗑️</div>布局数据已清空</div>';
      document.getElementById('nodeCount').textContent = '节点: 0';
      document.getElementById('updateTime').textContent = '更新时间: --';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.style.background = type === 'error' ? '#e74c3c' : '#27ae60';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    // 页面加载完成后初始化
    window.addEventListener('DOMContentLoaded', function() {
      initWebSocket();
      // 登录成功后会自动请求布局数据，这里不需要额外调用
    });
  </script>
</body>
</html>
