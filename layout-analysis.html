<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>布局分析</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      user-select: none;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 {
      font-size: 18px;
      margin: 0;
    }
    .header-info {
      display: flex;
      gap: 15px;
      align-items: center;
      font-size: 13px;
    }
    .header-info span {
      padding: 5px 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
    }
    .toolbar {
      background: #f8f9fa;
      padding: 10px 20px;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid #ddd;
      flex-wrap: wrap;
      position: sticky;
      top: 60px;
      z-index: 99;
    }
    .toolbar button {
      padding: 8px 16px;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      background: white;
    }
    .toolbar button:hover {
      background: #e9ecef;
    }
    .content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .tree-panel {
      width: 40%;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      background: white;
    }
    .stats {
      margin: 10px;
      padding: 10px;
      background: #e8f4f8;
      border-radius: 5px;
      font-size: 12px;
    }
    .tree-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      font-size: 12px;
    }
    .json-panel {
      width: 60%;
      padding: 10px;
      overflow: auto;
      background: white;
    }
    .json-panel pre {
      margin: 0;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .tree-item {
      padding: 1px 0;
      line-height: 1.6;
      cursor: pointer;
      white-space: nowrap;
      border-radius: 3px;
      padding: 1px 3px;
    }
    .tree-item:hover {
      background: #e3f2fd;
    }
    .tree-toggle {
      color: #2196F3;
      font-weight: bold;
      margin-right: 3px;
    }
    .tree-toggle.expandable {
      color: #E91E63;
    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      font-size: 16px;
      color: #666;
    }
    .no-data {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      font-size: 14px;
      color: #999;
    }
    .no-data .icon {
      font-size: 48px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 布局分析 - <span id="deviceId">设备</span></h1>
    <div class="header-info">
      <span id="nodeCount">节点: 0</span>
      <span id="updateTime">更新时间: -</span>
    </div>
  </div>

  <div class="toolbar">
    <input id="layoutSearch" type="text" placeholder="🔍 搜索 className/text/id/desc..." style="width: 280px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px;" oninput="searchLayoutTree(this.value)">
    <button id="btnNextMatch" onclick="goToNextMatch()" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer;" title="下一个匹配">⬇️ 下一个</button>
    <span id="layoutSearchCount" style="margin-left: 10px; font-size: 12px; color: #666;"></span>
    <div style="flex: 1;"></div>
    <button onclick="refreshLayout()">🔄 刷新</button>
    <button onclick="exportLayout()">📥 导出</button>
    <button onclick="clearLayout()">🗑️ 清空</button>
  </div>

  <div class="content" id="layoutContent">
    <div class="loading">⏳ 正在获取布局数据...</div>
  </div>

  <script>
    let currentDeviceId = '';
    let layoutData = null;
    let currentMatchIndex = 0;
    let matchElements = [];

    // 从 URL 获取设备 ID
    const urlParams = new URLSearchParams(window.location.search);
    currentDeviceId = urlParams.get('deviceId') || '';

    document.getElementById('deviceId').textContent = '设备: ' + currentDeviceId;

    // 监听来自主页面的消息
    window.addEventListener('message', function(event) {
      console.log('[布局分析] 收到主页面消息:', JSON.stringify(event.data));
      
      // 处理布局数据
      if (event.data && event.data.type === 'layoutData' && event.data.deviceId === currentDeviceId) {
        layoutData = event.data.layout;
        renderLayout(layoutData);
      }
      
      // 处理错误消息
      if (event.data && event.data.type === 'error') {
        showToast(event.data.message, 'error');
        document.getElementById('layoutContent').innerHTML = '<div class="loading">❌ ' + event.data.message + '</div>';
      }
    });

    // 请求刷新布局（通过 postMessage 通知主页面）
    function refreshLayout() {
      console.log('[布局分析] refreshLayout 被调用, deviceId:', currentDeviceId);
      
      document.getElementById('layoutContent').innerHTML = '<div class="loading">⏳ 正在获取布局数据...</div>';
      
      // 通过 postMessage 通知主页面发送布局请求
      if (window.opener) {
        console.log('[布局分析] 向主页面发送布局请求');
        window.opener.postMessage({
          type: 'requestLayout',
          deviceId: currentDeviceId
        }, '*');
      } else {
        console.log('[布局分析] 没有找到主窗口，尝试通过 parent 发送');
        window.parent.postMessage({
          type: 'requestLayout',
          deviceId: currentDeviceId
        }, '*');
      }
    }

    // 渲染布局
    function renderLayout(data) {
      console.log('[布局分析] 开始渲染布局, data:', data ? '存在' : '不存在');
      
      if (!data) {
        document.getElementById('layoutContent').innerHTML = '<div class="no-data"><div class="icon">📭</div>暂无布局数据</div>';
        return;
      }
      
      // 更新统计信息
      const stats = data.meta || {};
      document.getElementById('nodeCount').textContent = '节点: ' + (stats.nodeCount || 0);
      document.getElementById('updateTime').textContent = '更新时间: ' + new Date().toLocaleTimeString();
      
      // 构建左右分栏布局
      let html = `
        <div class="tree-panel">
          <div class="stats">
            <b>📊 ${stats.packageName || '未知'}</b><br>
            节点: ${stats.nodeCount || 0} | 耗时: ${stats.captureDuration || 0}ms
          </div>
          <div class="tree-container" id="layoutTree"></div>
        </div>
        <div class="json-panel">
          <pre id="layoutJson"></pre>
        </div>
      `;
      
      document.getElementById('layoutContent').innerHTML = html;
      
      // 初始显示提示信息
      document.getElementById('layoutJson').innerHTML = `
        <div style="padding: 20px; text-align: center; color: #999;">
          <div style="font-size: 48px; margin-bottom: 15px;">👆</div>
          <p style="font-size: 14px;">点击左侧树形结构中的节点</p>
          <p style="font-size: 12px; margin-top: 5px;">查看节点详细信息</p>
        </div>
      `;
      
      // 构建树形结构
      buildLayoutTree(data.hierarchy);
      
      console.log('[布局分析] 布局渲染完成');
    }
    
    // 构建树形结构
    function buildLayoutTree(node, container, depth = 0) {
      if (!container) {
        container = document.getElementById('layoutTree');
        container.innerHTML = '';
      }
      
      if (!node) return;
      
      const hasChildren = node.children && node.children.length > 0;
      
      const item = document.createElement('div');
      item.style.padding = '1px 0';
      item.style.lineHeight = '1.6';
      
      // 创建行容器
      const row = document.createElement('span');
      row.style.cursor = 'pointer';
      row.style.whiteSpace = 'nowrap';
      row.style.display = 'inline-block';
      row.style.minHeight = '20px';
      row.style.borderRadius = '3px';
      row.style.padding = '1px 3px';
      row.onmouseover = () => row.style.background = '#e3f2fd';
      row.onmouseout = () => row.style.background = '';
      
      // 缩进
      const indent = '\u00A0\u00A0'.repeat(depth);
      row.innerHTML = indent;
      
      // 展开/折叠图标
      const toggleIcon = document.createElement('span');
      toggleIcon.className = 'tree-toggle';
      toggleIcon.style.color = '#2196F3';
      toggleIcon.style.fontWeight = 'bold';
      toggleIcon.style.marginRight = '3px';
      
      let expanded = true;
      
      if (hasChildren) {
        toggleIcon.textContent = expanded ? '−' : '+';
        toggleIcon.style.color = '#E91E63';
        toggleIcon.title = expanded ? '点击收起' : '点击展开';
        toggleIcon.className = 'tree-toggle expandable';
      } else {
        toggleIcon.textContent = '';
        toggleIcon.style.width = '10px';
        toggleIcon.style.display = 'inline-block';
      }
      row.appendChild(toggleIcon);
      
      // 图标
      let icon = '📄';
      if (node.clickable) icon = '🖱️';
      else if (node.scrollable) icon = '📜';
      else if (node.checkable) icon = '☑️';
      
      const iconSpan = document.createElement('span');
      iconSpan.textContent = icon;
      iconSpan.style.marginRight = '3px';
      row.appendChild(iconSpan);
      
      // 文本信息
      const textSpan = document.createElement('span');
      const nodeText = node.text || node.desc || node.className || 'Unknown';
      const idText = node.id ? ` [${node.id}]` : '';
      textSpan.textContent = nodeText + idText;
      textSpan.title = `className: ${node.className}\ntext: ${node.text || ''}\ndesc: ${node.desc || ''}\nid: ${node.id || ''}`;
      row.appendChild(textSpan);
      
      item.appendChild(row);
      
      // 子节点容器
      let childrenContainer = null;
      if (hasChildren) {
        childrenContainer = document.createElement('div');
        childrenContainer.style.display = expanded ? 'block' : 'none';
        node.children.forEach(child => {
          buildLayoutTree(child, childrenContainer, depth + 1);
        });
        item.appendChild(childrenContainer);
        
        // 点击切换展开/折叠
        toggleIcon.onclick = (e) => {
          e.stopPropagation();
          expanded = !expanded;
          toggleIcon.textContent = expanded ? '−' : '+';
          childrenContainer.style.display = expanded ? 'block' : 'none';
          toggleIcon.title = expanded ? '点击收起' : '点击展开';
        };
        
        row.onclick = (e) => {
          e.stopPropagation();
          expanded = !expanded;
          toggleIcon.textContent = expanded ? '−' : '+';
          childrenContainer.style.display = expanded ? 'block' : 'none';
          toggleIcon.title = expanded ? '点击收起' : '点击展开';
          // 显示节点详情
          showNodeDetails(node);
        };
      } else {
        // 没有子节点的节点，点击直接显示详情
        row.onclick = (e) => {
          e.stopPropagation();
          showNodeDetails(node);
        };
      }
      
      container.appendChild(item);
    }
    
    // 显示节点详情
    function showNodeDetails(node) {
      const jsonPanel = document.getElementById('layoutJson');
      if (!jsonPanel || !node) return;
      
      // 构建详细信息表格
      let html = `
        <div style="padding: 10px;">
          <h3 style="margin-bottom: 15px; color: #667eea; border-bottom: 2px solid #667eea; padding-bottom: 5px;">📋 节点详情</h3>
          <table style="width: 100%; border-collapse: collapse; font-size: 12px;">
      `;
      
      const fields = [
        { label: '类名', value: node.className, highlight: true },
        { label: '包名', value: node.packageName },
        { label: '文本', value: node.text, highlight: true },
        { label: '描述', value: node.desc },
        { label: 'ID', value: node.id, highlight: true },
        { label: '深度', value: node.depth },
        { label: '父级索引', value: node.indexInParent },
        { label: '子节点数', value: node.childCount },
        { label: '点击区域', value: node.boundsInScreen ? formatBounds(node.boundsInScreen) : null },
        { label: '可点击', value: node.clickable ? '是' : '否', bool: node.clickable },
        { label: '可长按', value: node.longClickable ? '是' : '否', bool: node.longClickable },
        { label: '可滚动', value: node.scrollable ? '是' : '否', bool: node.scrollable },
        { label: '可用', value: node.enabled ? '是' : '否', bool: node.enabled },
        { label: '可勾选', value: node.checkable ? '是' : '否', bool: node.checkable },
        { label: '已勾选', value: node.checked ? '是' : '否', bool: node.checked },
        { label: '可见', value: node.visibleToUser ? '是' : '否', bool: node.visibleToUser },
      ];
      
      fields.forEach(field => {
        if (field.value !== undefined && field.value !== null && field.value !== '') {
          const valueClass = field.bool 
            ? (field.bool ? 'color: #27ae60; font-weight: bold;' : 'color: #999;')
            : (field.highlight ? 'color: #e74c3c; font-weight: bold;' : '');
          html += `
            <tr>
              <td style="padding: 6px 10px; text-align: right; background: #f8f9fa; width: 100px; border-bottom: 1px solid #eee;">${field.label}</td>
              <td style="padding: 6px 10px; border-bottom: 1px solid #eee; ${valueClass}">${escapeHtml(String(field.value))}</td>
            </tr>
          `;
        }
      });
      
      html += `
          </table>
          <div style="margin-top: 15px; padding: 10px; background: #e8f4f8; border-radius: 5px;">
            <h4 style="margin-bottom: 8px; color: #2980b9;">📄 JSON 数据</h4>
            <pre style="font-size: 10px; max-height: 200px; overflow-y: auto; margin: 0;">${JSON.stringify(node, null, 2)}</pre>
          </div>
        </div>
      `;
      
      jsonPanel.innerHTML = html;
    }
    
    // 格式化边界信息
    function formatBounds(bounds) {
      if (!bounds) return '未知';
      return `[${bounds.left || 0}, ${bounds.top || 0}] - [${bounds.right || 0}, ${bounds.bottom || 0}]`;
    }

    // 搜索布局树
    function searchLayoutTree(keyword) {
      const countDiv = document.getElementById('layoutSearchCount');
      const treeContainer = document.getElementById('layoutTree');
      
      if (!keyword || !treeContainer) {
        countDiv.textContent = '';
        // 清除所有高亮
        treeContainer.querySelectorAll('.search-highlight').forEach(el => {
          el.classList.remove('search-highlight');
          el.style.background = '';
        });
        matchElements = [];
        currentMatchIndex = 0;
        return;
      }
      
      keyword = keyword.toLowerCase();
      const rows = treeContainer.querySelectorAll('span[style*="white-space: nowrap"]');
      matchElements = [];
      
      rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        const isMatch = text.includes(keyword);
        
        if (isMatch) {
          row.style.background = '#ffeb3b';
          matchElements.push(row);
        } else {
          row.style.background = '';
        }
      });
      
      currentMatchIndex = 0;
      countDiv.textContent = matchElements.length > 0 ? `找到 ${matchElements.length} 个匹配` : '未找到';
      
      // 自动展开匹配节点的父节点
      if (matchElements.length > 0) {
        matchElements.forEach(row => {
          expandParentNodes(row, treeContainer);
        });
      }
    }
    
    // 展开节点的父节点
    function expandParentNodes(row, treeContainer) {
      let parent = row.parentElement;
      while (parent && parent !== treeContainer) {
        if (parent.style.display === 'none' && parent.previousSibling) {
          const toggleIcon = parent.previousSibling.querySelector('.tree-toggle');
          if (toggleIcon) {
            parent.style.display = 'block';
            toggleIcon.textContent = '−';
          }
        }
        parent = parent.parentElement;
      }
    }
    
    // 跳转到下一个匹配
    function goToNextMatch() {
      if (matchElements.length === 0) {
        showToast('没有搜索结果', 'warning');
        return;
      }
      
      // 移除当前高亮
      matchElements.forEach(el => el.style.border = '');
      
      // 移动到下一个
      currentMatchIndex = (currentMatchIndex + 1) % matchElements.length;
      
      // 高亮当前
      const currentEl = matchElements[currentMatchIndex];
      currentEl.style.border = '2px solid #e94560';
      currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      
      // 更新计数显示
      document.getElementById('layoutSearchCount').textContent = `${currentMatchIndex + 1}/${matchElements.length}`;
    }

    function exportLayout() {
      if (!layoutData) {
        showToast('没有布局数据可导出', 'warning');
        return;
      }
      
      const blob = new Blob([JSON.stringify(layoutData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'layout_' + currentDeviceId + '_' + new Date().toISOString().slice(0, 10) + '.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('布局数据已导出', 'success');
    }

    function clearLayout() {
      layoutData = null;
      document.getElementById('layoutContent').innerHTML = '<div class="loading">⏳ 正在获取布局数据...</div>';
      document.getElementById('nodeCount').textContent = '节点: 0';
      document.getElementById('updateTime').textContent = '更新时间: -';
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;background:' + 
        (type === 'error' ? '#e74c3c' : '#27ae60') + ';color:white;border-radius:4px;z-index:1000;';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    // 页面加载完成后初始化
    window.addEventListener('DOMContentLoaded', function() {
      // 页面加载后自动请求布局数据
      refreshLayout();
    });
  </script>
</body>
</html>
