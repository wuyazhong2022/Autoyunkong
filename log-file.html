<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日志文件</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Consolas', 'Courier New', monospace;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #16213e;
      padding: 15px 20px;
      border-bottom: 2px solid #0f3460;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .header h1 {
      font-size: 16px;
      color: #27ae60;
    }
    .header-info {
      display: flex;
      gap: 15px;
      align-items: center;
      font-size: 13px;
    }
    .header-info span {
      padding: 5px 10px;
      background: #0f3460;
      border-radius: 4px;
    }
    .toolbar {
      background: #16213e;
      padding: 10px 20px;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid #0f3460;
      flex-wrap: wrap;
    }
    .toolbar button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn-refresh {
      background: #27ae60;
      color: white;
    }
    .btn-refresh:hover {
      background: #219150;
    }
    .btn-copy {
      background: #3498db;
      color: white;
    }
    .btn-copy:hover {
      background: #2980b9;
    }
    .btn-save {
      background: #9b59b6;
      color: white;
    }
    .btn-save:hover {
      background: #8e44ad;
    }
    .btn-clear {
      background: #95a5a6;
      color: white;
    }
    .btn-clear:hover {
      background: #7f8c8d;
    }
    .content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    .log-line {
      margin: 2px 0;
      padding: 2px 5px;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.4;
    }
    .section-title {
      color: #aaa;
      padding: 10px 5px 5px;
      border-bottom: 1px solid #444;
      margin-top: 15px;
      font-weight: bold;
    }
    .no-data {
      text-align: center;
      padding: 50px;
      color: #888;
    }
    .no-data .icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    .loading {
      text-align: center;
      padding: 50px;
      color: #27ae60;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #27ae60;
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      z-index: 1000;
      animation: fadeIn 0.3s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📁 日志文件</h1>
    <div class="header-info">
      <span id="deviceId">设备: --</span>
      <span id="logCount">日志: 0 条</span>
      <span id="updateTime">更新时间: --</span>
    </div>
  </div>
  
  <div class="toolbar">
    <button class="btn-refresh" onclick="refreshLogFile()">🔄 刷新</button>
    <button class="btn-copy" onclick="copyLogFile()">📋 复制</button>
    <button class="btn-save" onclick="saveLogFile()">💾 保存</button>
    <button class="btn-clear" onclick="clearLogFile()">🗑️ 清空</button>
  </div>
  
  <div class="content" id="logContent">
    <div class="loading">⏳ 正在获取日志文件...</div>
  </div>

  <script>
    let currentDeviceId = '';
    let logContent = null;
    let ws = null;

    // 从 URL 获取设备 ID
    const urlParams = new URLSearchParams(window.location.search);
    currentDeviceId = urlParams.get('deviceId') || '';

    document.getElementById('deviceId').textContent = '设备: ' + currentDeviceId;

    // 监听 postMessage 从父窗口接收日志
    function initPostMessageListener() {
      window.addEventListener('message', function(event) {
        const msg = event.data;
        if (msg && msg.type === 'logFile' && msg.deviceId === currentDeviceId) {
          logContent = msg.content;
          renderLogFile(logContent);
        }
      });
    }

    // 请求刷新日志文件
    function refreshLogFile() {
      document.getElementById('logContent').innerHTML = '<div class="loading">⏳ 正在获取日志文件...</div>';
      
      if (window.opener && window.opener.openDeviceLogFile) {
        window.opener.openDeviceLogFile();
      } else {
        showToast('请从设备日志窗口打开此页面', 'error');
      }
      
      setTimeout(() => {
        const content = document.getElementById('logContent');
        if (content.querySelector('.loading')) {
          content.innerHTML = '<div class="no-data"><div class="icon">⏰</div>请求超时，请检查设备是否在线</div>';
        }
      }, 15000);
    }

    // 渲染日志文件内容
    function renderLogFile(content) {
      const container = document.getElementById('logContent');
      
      if (!content || content.trim() === '') {
        container.innerHTML = '<div class="no-data"><div class="icon">📭</div>暂无日志文件内容</div>';
        document.getElementById('logCount').textContent = '日志: 0 条';
        document.getElementById('updateTime').textContent = '更新时间: --';
        return;
      }
      
      const lines = content.split('\n').filter(function(line) { return line.trim() !== ''; });
      document.getElementById('logCount').textContent = '日志: ' + lines.length + ' 条';
      document.getElementById('updateTime').textContent = '更新时间: ' + new Date().toLocaleTimeString();
      
      let html = '';
      if (lines.length > 0) {
        html += '<div class="section-title">【控制台日志 - ' + lines.length + ' 条】</div>';
        lines.forEach(function(line) {
          let color = '#00ff00';
          if (line.indexOf('[ERR]') !== -1 || line.indexOf('ERROR') !== -1 || line.indexOf('错误') !== -1 || line.indexOf('失败') !== -1) {
            color = '#ff4444';
          } else if (line.indexOf('[WRN]') !== -1 || line.indexOf('WARN') !== -1 || line.indexOf('警告') !== -1) {
            color = '#ffaa00';
          } else if (line.indexOf('DEBUG') !== -1) {
            color = '#3498db';
          }
          html += '<div class="log-line"><span style="color:' + color + ';">' + escapeHtml(line) + '</span></div>';
        });
      } else {
        html += '<div class="log-line" style="color:#888;">未找到控制台日志</div>';
      }
      
      container.innerHTML = html;
      container.scrollTop = container.scrollHeight;
    }

    // 复制日志
    function copyLogFile() {
      if (!logContent) {
        showToast('暂无日志可复制', 'error');
        return;
      }
      
      navigator.clipboard.writeText(logContent).then(() => {
        showToast('已复制到剪贴板');
      }).catch(e => {
        console.error(e);
        showToast('复制失败', 'error');
      });
    }

    // 保存日志
    function saveLogFile() {
      if (!logContent) {
        showToast('暂无日志可保存', 'error');
        return;
      }
      
      const blob = new Blob([logContent], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'device_log_' + currentDeviceId + '_' + new Date().toISOString().slice(0, 10) + '.txt';
      a.click();
      URL.revokeObjectURL(url);
      
      showToast('日志文件已保存');
    }

    // 清空日志
    function clearLogFile() {
      logContent = null;
      document.getElementById('logContent').innerHTML = '<div class="no-data"><div class="icon">🗑️</div>日志已清空</div>';
      document.getElementById('logCount').textContent = '日志: 0 条';
      document.getElementById('updateTime').textContent = '更新时间: --';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.style.background = type === 'error' ? '#e74c3c' : '#27ae60';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    // 页面加载完成后初始化
    window.addEventListener('DOMContentLoaded', function() {
      initPostMessageListener();
      
      // 3秒后自动刷新
      setTimeout(refreshLogFile, 3000);
    });
  </script>
</body>
</html>
